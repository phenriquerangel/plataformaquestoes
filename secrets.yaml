apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  # Credenciais para o banco de dados PostgreSQL
  # ATENÇÃO: O postgres-deploy.yaml também precisa ser ajustado para usar estes valores.
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "admin123"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # Chave da API do Google Gemini
  GEMINI_API_KEY: "SUA_CHAVE_AQUI" # <-- 🚨 SUBSTITUA PELA SUA CHAVE REAL

  # Chave para assinar os tokens JWT de autenticação
  JWT_SECRET_KEY: "troque-esta-chave-por-algo-mais-seguro-e-aleatorio"

  # Credenciais de login para os usuários padrão da aplicação
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "admin123"
  USER_USERNAME: "professor"
  USER_PASSWORD: "professor123"