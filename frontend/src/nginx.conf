log_format proxy_format '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'upstream_addr=$upstream_addr '
                        'upstream_status=$upstream_status '
                        'upstream_response_time=$upstream_response_time '
                        'request_time=$request_time';

server {
    listen 80;
    server_name localhost;

    # Habilita logs de acesso e erro detalhados para depuração
    access_log /var/log/nginx/access.log proxy_format;
    error_log /var/log/nginx/error.log info;

    # Raiz para os arquivos estáticos do React
    root /usr/share/nginx/html;
    index index.html;

    # Rota para a API do backend
    location /api/ {
        # A diretiva 'resolver' ensina o Nginx a usar o DNS interno do Kubernetes.
        # O endereço IP 10.96.0.10 é o endereço padrão do serviço kube-dns.
        # Isso é mais robusto do que usar o nome FQDN.
        resolver 10.96.0.10 valid=5s;

        # A variável garante que o Nginx re-resolva o DNS em cada requisição,
        # em vez de fazer cache de um resultado antigo e quebrado.
        set $backend_service "backend-questions-service";

        # A barra no final de 'proxy_pass' remove o prefixo /api/ da URL.
        # Ex: /api/materias é encaminhado para http://<ip-do-backend>:8000/materias
        proxy_pass http://$backend_service:8000/;

        # Headers importantes para o proxy reverso
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rota para servir a aplicação React (SPA)
    location / {
        try_files $uri /index.html;
    }
}