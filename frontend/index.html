<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduQuest.ai - Gerador de Questões Inteligente</title>
    <meta name="description" content="Gere listas de exercícios e provas com inteligência artificial de forma rápida e eficiente.">
    <meta name="keywords" content="questões, provas, IA, inteligência artificial, educação, gerador, simulados">
    <meta name="author" content="EduQuest.ai">
    <meta name="theme-color" content="#4f46e5"> <!-- Cor principal do tema (indigo-600) -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      body {
        background-color: #f8fafc;
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #e2e8f0;
        border-top: 5px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.76, 0, 0.24, 1) infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-weight: 700;
        color: #1e1b4b;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="spinner"></div>
        <p class="loading-text">EduQuest.ai</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
